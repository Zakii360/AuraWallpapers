<!DOCTYPE html>
<html>

<head>

<style>

html,
body {

    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#050505;

}


canvas {

    width:100%;
    height:100%;
    display:block;

}


</style>

</head>


<body>


<canvas id="canvas"></canvas>


<script>

const canvas =
document.getElementById("canvas");


const ctx =
canvas.getContext("2d");


let particles = [];



function resize(){

    canvas.width =
        window.innerWidth;

    canvas.height =
        window.innerHeight;

}


window.onresize = resize;

resize();



for(let i=0;i<120;i++){

    particles.push({

        x:Math.random()*canvas.width,

        y:Math.random()*canvas.height,

        size:
            Math.random()*3+1,

        speed:
            Math.random()*0.5+0.2

    });

}



function draw(){

    const time =
        Date.now()*0.001;


    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );


    const gradient =
        ctx.createLinearGradient(
            0,
            0,
            canvas.width,
            canvas.height
        );


    gradient.addColorStop(
        0,
        `hsl(${220+Math.sin(time)*20},70%,15%)`
    );


    gradient.addColorStop(
        1,
        `hsl(${280+Math.cos(time)*20},60%,8%)`
    );


    ctx.fillStyle =
        gradient;


    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );



    particles.forEach(p=>{


        p.y -= p.speed;


        if(p.y < -10){

            p.y =
            canvas.height+10;

        }


        ctx.beginPath();


        ctx.arc(
            p.x,
            p.y,
            p.size,
            0,
            Math.PI*2
        );


        ctx.fillStyle =
        "rgba(255,255,255,0.35)";


        ctx.fill();


    });



    requestAnimationFrame(draw);

}


draw();


</script>


</body>

</html>
