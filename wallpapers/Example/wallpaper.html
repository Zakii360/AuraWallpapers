<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>AuraWallpapers Scene</title>


<style>

html,
body {

    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;

    background:#000;

}


#scene {

    position:absolute;

    inset:0;

    overflow:hidden;

}



#image {


    position:absolute;

    width:110%;
    height:110%;

    left:-5%;
    top:-5%;

    object-fit:cover;

    animation:
        drift 30s infinite alternate ease-in-out;


    filter:
        brightness(var(--brightness))
        contrast(var(--contrast))
        saturate(var(--saturation));


}




#rain {

    position:absolute;

    inset:0;

    pointer-events:none;

}




.drop {


    position:absolute;

    width:2px;

    height:40px;

    background:
        linear-gradient(
            transparent,
            rgba(255,255,255,.5)
        );


    animation:
        fall linear infinite;


}




#particles {


    position:absolute;

    inset:0;


}



.particle {


    position:absolute;

    width:3px;

    height:3px;

    background:white;

    border-radius:50%;

    opacity:.5;


    animation:
        float linear infinite;

}




@keyframes drift {


from {

    transform:
        scale(1)
        translate3d(0,0,0);

}


to {

    transform:
        scale(1.12)
        translate3d(-35px,-15px,0);

}


}





@keyframes fall {


from {

    transform:
        translateY(-20vh);

}


to {

    transform:
        translateY(120vh);

}


}





@keyframes float {


from {

    transform:
        translateY(100vh);

}


to {

    transform:
        translateY(-10vh);

}


}



</style>

</head>


<body>


<div id="scene">


<img
id="image"
src="image.png"
/>


<div id="rain"></div>


<div id="particles"></div>


</div>




<script>


const params =
    new URLSearchParams(
        location.search
    );


let config =
    {};



try {


config =
    JSON.parse(

        atob(
            params.get("aura")
        )

    );


}

catch{


console.log(
    "Default wallpaper settings"
);


}





const effects =
    config.effects || {};






const camera =
    effects.camera || {};



const image =
    document.getElementById(
        "image"
    );



image.style.setProperty(

    "--brightness",

    camera.brightness || 1

);



image.style.setProperty(

    "--contrast",

    camera.contrast || 1

);



image.style.setProperty(

    "--saturation",

    camera.saturation || 1

);







// Rain system

const rain =
    effects.rain || {};



if(
    rain.enabled
){


const container =
    document.getElementById(
        "rain"
    );



for(
    let i=0;
    i<(rain.amount || 150);
    i++
){


const drop =
    document.createElement(
        "div"
    );


drop.className =
    "drop";


drop.style.left =
    Math.random()*100
    +"%";



drop.style.animationDuration =
    (0.5+
    Math.random()*1)
    +"s";



drop.style.animationDelay =
    Math.random()*3
    +"s";



container.appendChild(
    drop
);


}


}







//
// Particle system
//

const particles =
    effects.particles || {};



if(
    particles.enabled
){


const container =
    document.getElementById(
        "particles"
    );



for(
    let i=0;
    i<(particles.amount || 80);
    i++
){


const p =
    document.createElement(
        "div"
    );


p.className =
    "particle";


p.style.left =
    Math.random()*100
    +"%";


p.style.animationDuration =
    (
        5+
        Math.random()*15
    )
    +"s";


p.style.animationDelay =
    Math.random()*10
    +"s";


container.appendChild(
    p
);


}


}



</script>


</body>

</html>
