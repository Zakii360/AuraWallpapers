<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>AuraWallpapers Example</title>


<style>

html,
body {

    margin: 0;

    width: 100%;
    height: 100%;

    overflow: hidden;

    background: #000;

}



#background {

    position: absolute;

    inset: 0;

    width: 100%;
    height: 100%;

    object-fit: cover;

    transform: scale(1.05);

    animation:
        drift 30s infinite alternate ease-in-out;

}



.overlay {

    position: absolute;

    inset: 0;

    background:
        radial-gradient(
            circle at center,
            transparent 25%,
            rgba(0,0,0,0.55)
        );

    pointer-events: none;

}





.particles {

    position: absolute;

    inset: 0;

    pointer-events: none;

}



.particle {

    position: absolute;

    width: 3px;

    height: 3px;


    background:
        rgba(255,255,255,0.75);


    border-radius: 50%;


    filter:
        blur(.2px);


    animation:
        float linear infinite;

}




@keyframes drift {


    from {

        transform:
            scale(1.05)
            translate3d(0,0,0);

    }


    to {

        transform:
            scale(1.15)
            translate3d(-35px,-15px,0);

    }


}




@keyframes float {


    from {

        transform:
            translate3d(
                0,
                110vh,
                0
            );

        opacity: 0;

    }



    15% {

        opacity: .8;

    }



    to {

        transform:
            translate3d(
                20px,
                -10vh,
                0
            );

        opacity: 0;

    }


}




</style>


</head>


<body>


<img
    id="background"
    src="image.png"
    draggable="false"
/>



<div class="overlay"></div>


<div
    class="particles"
    id="particles">
</div>




<script>


const particleContainer =
    document.getElementById(
        "particles"
    );



const particleCount = 100;



for(
    let i = 0;
    i < particleCount;
    i++
){


    const particle =
        document.createElement(
            "div"
        );



    particle.className =
        "particle";



    particle.style.left =
        Math.random() * 100 + "%";



    particle.style.animationDuration =
        (
            6 +
            Math.random() * 18
        )
        + "s";



    particle.style.animationDelay =
        (
            Math.random() * 15
        )
        + "s";



    const size =
        (
            1 +
            Math.random() * 4
        );



    particle.style.width =
        size + "px";


    particle.style.height =
        size + "px";



    particleContainer.appendChild(
        particle
    );


}




// pause animations when hidden
// saves GPU usage like real wallpaper engines
// real issue I had with other engines
// clear taskbar won't be affected btw
// ok this is too many comments...


document.addEventListener(
    "visibilitychange",
    () => {


        document.body.style.animationPlayState =
            document.hidden
                ? "paused"
                : "running";


    }
);


</script>


</body>

</html>
