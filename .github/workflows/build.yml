name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build native desktop addon
        run: npm run build:addon

      - name: Package Windows build
        run: npm run build:win

      - uses: actions/upload-artifact@v4
        with:
          name: aurawallpapers-windows
          path: dist/*.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Package Linux build
        run: npm run build:linux

      - uses: actions/upload-artifact@v4
        with:
          name: aurawallpapers-linux
          path: dist/*.AppImage
