name: Build AuraWallpapers


on:

  push:

    branches:

      - main


  workflow_dispatch:





jobs:


  build:


    name: Build ${{ matrix.os }}


    runs-on: ${{ matrix.os }}



    strategy:


      matrix:


        os:

          - windows-latest

          - ubuntu-latest





    steps:


      - name: Checkout repository

        uses: actions/checkout@v4





      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:


          node-version: 22





      - name: Install dependencies

        run: npm install





      - name: Build application

        run: npm run build





      - name: Upload build artifacts

        uses: actions/upload-artifact@v4

        with:


          name: AuraWallpapers-${{ matrix.os }}


          path: release/
